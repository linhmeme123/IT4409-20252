  <head>

    <title>Survey Form</title>
    <link href="styles.css" rel="stylesheet">
  </head>

  <body>
    <h1 id="title">Survey Form</h1>

    <form method="POST" action="https://register-demo.freecodecamp.org" id="survey-form">
      <fieldset>
        <label for="name">Name<input id="name" name="name" type="text" placeholder="Enter your name" required /></label>
        <label for="email">Email<input id="email" name="email" type="email" placeholder="Enter your email" required /></label>
      </fieldset>
      <fieldset>
        <label for="age">Name<input id="age" name="age" type="number" placeholder="Age" min="10" max="" required /></label>
      </fieldset>
      <fieldset></fieldset>
      <fieldset></fieldset>
      <fieldset></fieldset>
      <fieldset></fieldset>
      <input type="submit" value="Submit" />
    </form>
  </body>
</html>
