<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý Người dùng</title>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* TODO: CSS container, table, button, modal, responsive */
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
      }

      .container {
        width: 80%;
        margin: 20px auto;
        background: #fff;
        padding: 20px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      h1 {
        text-align: center;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }

      th,
      td {
        padding: 12px 15px;
        border: 1px solid #ddd;
        text-align: left;
      }

      th {
        background: #f4f4f4;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 4px;
      }

      .btn-primary {
        background: #007bff;
        color: #fff;
      }

      .btn-danger {
        background: #dc3545;
        color: #fff;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgb(0, 0, 0);
        background-color: rgba(0, 0, 0, 0.4);
        padding-top: 60px;
      }

      .modal-content {
        background-color: #fefefe;
        margin: 5% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
      }

      .close {
        color: #aaa;
        float: right;
        font-size: 28px;
        font-weight: bold;
      }

      .close:hover,
      .close:focus {
        color: black;
        text-decoration: none;
        cursor: pointer;
      }

      input,
      select {
        padding: 8px;
        margin: 6px 0 12px;
        width: 100%;
        box-sizing: border-box;
      }

      .pagination {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
      }

      .pagination select {
        width: auto;
        margin: 0;
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 12px;
      }

      .error {
        color: #dc3545;
        display: block;
        margin-top: -8px;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const API_URL = "http://localhost:3001/api/users";

      function App() {
        const [users, setUsers] = React.useState([]);
        const [page, setPage] = React.useState(1);
        const [limit, setLimit] = React.useState(5);
        const [search, setSearch] = React.useState("");
        const [total, setTotal] = React.useState(0);
        const [totalPages, setTotalPages] = React.useState(1);
        const [showModal, setShowModal] = React.useState(false);
        const [editingUser, setEditingUser] = React.useState(null);

        // TODO: viết fetchUsers()
        // GET `${API_URL}?page=${page}&limit=${limit}&search=${encodeURIComponent(search)}`
        const fetchUsers = async () => {
          try {
            const response = await fetch(
              `${API_URL}?page=${page}&limit=${limit}&search=${encodeURIComponent(
                search
              )}`
            );

            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

            setUsers(data.data || []);
            setTotal(data.total || 0);
            setTotalPages(data.totalPages || 1);
          } catch (error) {
            console.error("Error fetching users:", error);
          }
        };

        // TODO: useEffect gọi fetchUsers khi page, limit, search đổi
        React.useEffect(() => {
          fetchUsers();
        }, [page, limit, search]);

        // TODO: viết deleteUser(id)
        const deleteUser = async (id) => {
          if (confirm("Bạn có chắc chắn muốn xóa người dùng này?")) {
            try {
              await fetch(`${API_URL}/${id}`, {
                method: "DELETE",
              });
              fetchUsers();
            } catch (error) {
              console.error("Error deleting user:", error);
            }
          }
        };

        return (
          <div className="container">
            <h1>Quản lý Người dùng</h1>

            {/* TODO: SearchBar */}
            <SearchBar value={search} onChange={(value) => setSearch(value)} />

            {/* TODO: nút Thêm người dùng */}
            <button
              className="btn-primary"
              onClick={() => {
                setEditingUser(null);
                setShowModal(true);
              }}
            >
              Thêm người dùng
            </button>

            {/* TODO: UserTable */}
            <UserTable
              users={users}
              page={page}
              limit={limit}
              onEdit={(user) => {
                setEditingUser(user);
                setShowModal(true);
              }}
              onDelete={(id) => deleteUser(id)}
            />

            {/* TODO: Pagination */}
            <Pagination
              page={page}
              totalPages={totalPages}
              limit={limit}
              onPageChange={(newPage) => setPage(newPage)}
              onLimitChange={(newLimit) => {
                setLimit(newLimit);
                setPage(1);
              }}
            />

            {/* TODO: UserModal khi showModal = true */}
            {showModal && (
              <UserModal
                user={editingUser}
                onClose={() => setShowModal(false)}
                onSave={() => {
                  setShowModal(false);
                  fetchUsers();
                }}
              />
            )}
          </div>
        );
      }

      function SearchBar({ value, onChange }) {
        // TODO: debounce 500ms
        const [searchTerm, setSearchTerm] = React.useState(value);

        React.useEffect(() => {
          const handler = setTimeout(() => {
            onChange(searchTerm);
          }, 500);

          return () => {
            clearTimeout(handler);
          };
        }, [searchTerm, onChange]);

        return (
          <input
            type="text"
            placeholder="Tìm kiếm..."
            value={searchTerm}
            onChange={(e) => setSearchTerm(e.target.value)}
          />
        );
      }

      function UserTable({ users, page, limit, onEdit, onDelete }) {
        // TODO:
        // STT = (page - 1) * limit + index + 1
        return (
          <table>
            <thead>
              <tr>
                <th>STT</th>
                <th>Tên</th>
                <th>Email</th>
                <th>Hành động</th>
              </tr>
            </thead>
            <tbody>
              {users.map((user, index) => (
                <tr key={user._id}>
                  <td>{(page - 1) * limit + index + 1}</td>
                  <td>{user.name}</td>
                  <td>{user.email}</td>
                  <td>
                    <button onClick={() => onEdit(user)}>Sửa</button>
                    <button onClick={() => onDelete(user._id)}>Xóa</button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        );
      }

      function Pagination({
        page,
        totalPages,
        limit,
        onPageChange,
        onLimitChange,
      }) {
        // TODO:
        // select 3,5,10
        // Prev disabled page === 1
        // Next disabled page >= totalPages
        // đổi limit thì reset page về 1
        return (
          <div className="pagination">
            <button onClick={() => onPageChange(page - 1)} disabled={page === 1}>
              Prev
            </button>
            <span>
              Page {page} of {totalPages}
            </span>
            <button
              onClick={() => onPageChange(page + 1)}
              disabled={page >= totalPages}
            >
              Next
            </button>
            <select
              value={limit}
              onChange={(e) => onLimitChange(Number(e.target.value))}
            >
              <option value={3}>3</option>
              <option value={5}>5</option>
              <option value={10}>10</option>
            </select>
          </div>
        );
      }

      function UserModal({ user, onClose, onSave }) {
        // TODO:
        // formData: name, age, email, address
        // validate frontend:
        // - name trim length >= 2
        // - age là số nguyên >= 0
        // - email chứa @ và .
        // - hiển thị lỗi dưới input
        // - POST khi thêm, PUT khi sửa
        const [formErrors, setFormErrors] = React.useState({});

        const validateUserData = (userData) => {
          const errors = {};

          if (userData.name.length < 2) {
            errors.name = "Tên phải có ít nhất 2 ký tự";
          }

          if (!Number.isInteger(userData.age) || userData.age < 0) {
            errors.age = "Tuổi phải là số nguyên lớn hơn hoặc bằng 0";
          }

          if (!userData.email.includes("@") || !userData.email.includes(".")) {
            errors.email = "Email không hợp lệ";
          }

          return errors;
        };

        const saveUser = async (userData) => {
          const url = user ? `${API_URL}/${user._id}` : API_URL;
          const method = user ? "PUT" : "POST";
          const response = await fetch(url, {
            method,
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify(userData),
          });

          if (!response.ok) {
            const data = await response.json().catch(() => ({}));
            throw new Error(data.error || `HTTP ${response.status}`);
          }
        };

        return (
          <div className="modal" style={{ display: "block" }}>
            <div className="modal-content">
              <span className="close" onClick={onClose}>
                &times;
              </span>
              <h2>{user ? "Sửa người dùng" : "Thêm người dùng"}</h2>
              <form
                onSubmit={async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const userData = {
              name: formData.get("name").trim(),
              age: Number(formData.get("age")),
              email: formData.get("email").trim(),
              address: formData.get("address").trim(),
            };

            // Validate frontend
            const errors = validateUserData(userData);
            if (Object.keys(errors).length > 0) {
              setFormErrors(errors);
              return;
            }

            try {
              await saveUser(userData);
              onSave();
            } catch (error) {
              setFormErrors({ submit: error.message });
            }
          }}
        >
          <div>
            <label htmlFor="name">Tên</label>
            <input
              type="text"
              id="name"
              name="name"
              defaultValue={user?.name}
            />
            {formErrors.name && (
              <span className="error">{formErrors.name}</span>
            )}
          </div>
          <div>
            <label htmlFor="age">Tuổi</label>
            <input type="number" id="age" name="age" defaultValue={user?.age} />
            {formErrors.age && <span className="error">{formErrors.age}</span>}
          </div>
          <div>
            <label htmlFor="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              defaultValue={user?.email}
            />
            {formErrors.email && (
              <span className="error">{formErrors.email}</span>
            )}
          </div>
          <div>
            <label htmlFor="address">Địa chỉ</label>
            <input
              type="text"
              id="address"
              name="address"
              defaultValue={user?.address}
            />
            {formErrors.address && (
              <span className="error">{formErrors.address}</span>
            )}
          </div>
                {formErrors.submit && (
                  <span className="error">{formErrors.submit}</span>
                )}
                <div className="form-actions">
                  <button type="button" onClick={onClose}>
                    Hủy
                  </button>
                  <button type="submit" className="btn-primary">
                    Lưu
                  </button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
